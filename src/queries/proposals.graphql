query GetProposals($first: Int!, $skip: Int!, $spaces: [String!]!) {
  proposals(
    first: $first,
    skip: $skip,
    where: {
      space_in: $spaces
    },
    orderBy: "created",
    orderDirection: asc
  ) {
    id
    title
    choices
    start
    end
    snapshot
    state
    author
    created
    space {
      id
      name
    }
  }
}
